name: Vercel Deployment Comment

on:
  deployment_status:

jobs:
  comment:
    name: Comment with Vercel Deployment URL
    runs-on: ubuntu-latest
    if: github.event.deployment_status.state == 'success'
    permissions:
      pull-requests: write
      issues: write
      deployments: read

    steps:
      - name: Find associated pull request
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.deployment.sha;
            const environment = context.payload.deployment.environment;
            const deploymentUrl = context.payload.deployment_status.environment_url;
            const deploymentId = context.payload.deployment.id;

            core.setOutput('sha', sha);
            core.setOutput('environment', environment);
            core.setOutput('deployment_url', deploymentUrl);

            // Search for pull requests associated with this commit SHA
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const matchingPR = pulls.data.find(pr => pr.head.sha === sha);
            if (matchingPR) {
              core.setOutput('pr_number', matchingPR.number);
              core.setOutput('found_pr', 'true');
            } else {
              core.setOutput('found_pr', 'false');
            }

      - name: Comment on pull request
        if: steps.find-pr.outputs.found_pr == 'true' && steps.find-pr.outputs.deployment_url != ''
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.find-pr.outputs.deployment_url }}
          ENVIRONMENT: ${{ steps.find-pr.outputs.environment }}
          SHA: ${{ steps.find-pr.outputs.sha }}
        with:
          script: |
            const prNumber = parseInt('${{ steps.find-pr.outputs.pr_number }}');
            const deploymentUrl = process.env.DEPLOYMENT_URL;
            const environment = process.env.ENVIRONMENT;
            const sha = process.env.SHA;
            const shortSha = sha.substring(0, 7);

            const marker = '<!-- vercel-deployment-comment -->';
            const body = `${marker}
            ### ✅ Vercel Deployment Ready

            | | |
            |---|---|
            | **Environment** | \`${environment}\` |
            | **Commit** | [\`${shortSha}\`](https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${sha}) |
            | **Preview URL** | [${deploymentUrl}](${deploymentUrl}) |

            > This comment is automatically updated for each new deployment.`;

            // Check if a comment already exists and update it, otherwise create a new one
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existingComment = comments.data.find(c => c.body.includes(marker));
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
            }
